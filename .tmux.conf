# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Terminal & core ───────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"   # true colour
set -g extended-keys on
set -as terminal-features 'xterm-256color:extkeys'

set -g mouse on
set -g base-index 1           # windows start at 1
set -g pane-base-index 1
set -g renumber-windows on    # keep indices compact after close
set -sg escape-time 0         # no ESC delay (important for nvim)
set -g focus-events on        # pass focus events to nvim

# ── Moonfly palette ───────────────────────────────────────────────────────────
#   bg      #080808   bg_alt   #1c1c1c   panel    #262626
#   fg      #c6c6c6   comment  #696969
#   blue    #80a0ff   violet   #cf87e8   cyan     #79dac8
#   green   #8cc85f   yellow   #e3c78a   red      #ff5454

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1c1c1c,fg=#c6c6c6"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#80a0ff,fg=#080808,bold] #S #[bg=#1c1c1c,fg=#80a0ff]"

# Right: user@host | time | date
set -g status-right-length 60
set -g status-right "#[fg=#696969]#[fg=#79dac8,bg=#1c1c1c] #(whoami)@#h #[fg=#696969]│#[fg=#8cc85f] %H:%M #[fg=#696969]│#[fg=#e3c78a] %d %b "

# Window list (centre)
set -g status-justify left
set -g window-status-format         " #[fg=#696969]#I #[fg=#9e9e9e]#W "
set -g window-status-current-format " #[fg=#cf87e8,bold]#I #[fg=#c6c6c6,bold]#W#[fg=#cf87e8]#{?window_zoomed_flag, 󰊓,} "
set -g window-status-separator      ""

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#3a3a3a"
set -g pane-active-border-style "fg=#80a0ff"
set -g pane-border-status       top
set -g pane-border-format       "#{?pane_active,#[fg=#80a0ff bold] #P  #[fg=#c6c6c6 nobold]#{pane_current_command} ,#[fg=#696969] #P  #{pane_current_command} }"

# ── Message / command bar ─────────────────────────────────────────────────────
set -g message-style        "bg=#262626,fg=#e3c78a,bold"
set -g message-command-style "bg=#262626,fg=#79dac8,bold"

# ── Copy mode ─────────────────────────────────────────────────────────────────
set -g mode-style "bg=#80a0ff,fg=#080808"
bind -T copy-mode MouseDragEnd1Pane copy-pipe-and-cancel "wl-copy"

# ── Key bindings ──────────────────────────────────────────────────────────────
# Keep splits in current path
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with shift-arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Close pane without confirmation
bind x kill-pane

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
