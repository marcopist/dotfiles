# Starship prompt config - Moonfly theme aligned
# Colors from Moonfly palette: https://github.com/bluz71/vim-moonfly-colors

# Add a blank line before each prompt
add_newline = true

# Main format - informative and clean
format = """
$username\
$hostname\
$directory\
$nix_shell\
$git_branch\
$git_status\
$rust\
$golang\
$python\
$nodejs\
$cmd_duration
$character"""

# Nix shell indicator
[nix_shell]
symbol = "❄️ "
format = "[$symbol$state( \\($name\\))]($style) "
style = "bold #80a0ff"
impure_msg = "impure"
pure_msg = "pure"

# Directory - show up to 3 levels
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #79dac8"

# Git branch - show only if in a repo
[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold #cf87e8"

# Git status - compact
[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold #ff5454"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

# Command character
[character]
success_symbol = "[❯](#8cc85f bold)"
error_symbol = "[❯](#ff5454 bold)"

# Language modules - show when relevant
[rust]
symbol = "🦀 "
format = "[$symbol]($style)"
style = "bold #ff5454"

[golang]
symbol = "🐹 "
format = "[$symbol]($style)"
style = "bold #79dac8"

[python]
symbol = "🐍 "
format = "[$symbol]($style)"
style = "bold #80a0ff"

[nodejs]
symbol = " "
format = "[$symbol]($style)"
style = "bold #8cc85f"

# Command duration - show if took more than 500ms
[cmd_duration]
min_time = 500
format = "[took $duration]($style) "
style = "bold #e3c78a"

# Username - always show
[username]
show_always = true
format = "[$user]($style_user) "
style_user = "bold #8cc85f"

# Hostname - always show
[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "#696969"
